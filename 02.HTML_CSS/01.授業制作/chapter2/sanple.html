<!-- メモ書き　(コメント) -->

<!--↓ DOCTYPEはHTMLのバージョン -->
<!DOCTYPE html>
<!--　一番の外枠は＜html＞タグ　-->
<!DOCTYPE html>
<html lang="en">

    <!--<head>は設定情報など-->
    <head>
       <title>丸山のページ</title>
   
    </head>


    <!--<body>はWEBページの中身-->
    <body>
    　 <!--h1は大きな見出しを作成するタグ-->
        <h1>Htmlを書いてみよう</h1>
        <!--<p>は段落を作成するタグ-->
    <p>簡単な文を書いてみよう </p>

    <!--<h2>は小見出しタグ-->
        <h2>練習のコツ</h2>

        <!--リスト(箇条書き)を作成-->
        <!--リストの大枠：<ul>-->
        <!--リストの中身：<li>--> 
        <ul>
            <li>焦らない</li>
            <li>マメに保存</li>
            <li>楽しみながら</li>
        </ul> 
        <!--別のページに移動するリンク:<a>-->
        <!--段落を設定したいため<p>の中に<a>-->
        <!--!注意!<p>a<p>でそのまま打って大丈夫-->    
        <p><a href="https://www.google.com/finance/quote/.INX:INDEXSP?authuser=0">ここをクリック</a></p>

        <p>夕焼け画像を表示</p>
        <!--画像の表示:<img>※終了タグなし-->
        <!--src：画像の保存先-->
        <!--alt：表示エラーの場合の文字-->
        <img src="sample.jpg" alt="夕焼け画像">
        <img src="img/sample.jpg" alt="">
    </body>
</html>
