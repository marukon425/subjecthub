<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="parent"></ul>
    <script>
        const par = document.getElementById('parent');
    for (let i = 0; i < 10; i++) {
        const div = document.createElement('li');
        // iをテキストに直す
        div.textContent = i +1;
        par.appendChild(div);
    }
    </script>
</body>
</html>
