<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <p style="text-align: center; font-weight: 700;">デジタル時計</p>
        <h3 id="now-yymmdd" style="text-align: center; font-size: 50px; font-weight: 400;"></h3>
        <h1 id="now-hhmmss" style="text-align: center; font-size: 100px; font-weight: 400;"></h1>
    </main>
    <style>
        main{
            margin: 0 auto;
        }

        h3, h1{
            color: blue;
        }
    </style>



    <script>
    class Clock{
        init(){
            setInterval(() => {
                const date = new Date();
                const yymmdd = document.getElementById('now-yymmdd');
                const hhmmss = document.getElementById('now-hhmmss');
                const week = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];

                yymmdd.textContent = `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()} ${week[date.getDay()]}`;
                hhmmss.textContent = `${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;
            }, 1000); // ← 1秒ごとに更新
        }
    }

    new Clock().init();
    </script>
</body>
</html>
